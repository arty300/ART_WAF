services:
  waf:
    build: .
    container_name: academ_waf
    restart: unless-stopped
    ports:
      - "8080:8080"   # WAF proxy  — сюда направляй трафик вместо upstream
      - "9090:9090"   # Admin UI   — веб-интерфейс
    volumes:
      - waf_data:/data   # SQLite БД с логами, IP-назначениями и конфигом
    environment:
      - WAF_DB=/data/waf.db
      - WAF_WEB=/app/web

volumes:
  waf_data:
