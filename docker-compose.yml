services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: waf_db
      POSTGRES_PASSWORD: pass

  redis:
    image: redis:7-alpine

  caddy:
    image: caddy:latest
    ports: ["80:80"]
    volumes: ["./Caddyfile:/etc/caddy/Caddyfile"]

  waf-go:
    build: ./waf-go # Dockerfile из предыдущего ответа

  waf-backend:
    build: ./backend
    ports: ["8000:8000"]
    depends_on: [postgres, redis]
